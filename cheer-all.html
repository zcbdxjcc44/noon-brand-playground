<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All hands present — Noon Academy</title>
<style>
/* ─── INLINED Noon brand tokens (subset used by this file) ─────────────
   Original lives at noon-academy-design-system-main/project/colors_and_type.css.
   Inlined here so the file is portable when moved.                       */
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Work+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  /* core palette */
  --void:      #0a0f1a;
  --void-2:    #10172a;
  --void-3:    #1a2236;
  --ink:       #0a0f1a;

  /* gold (signal — arrival moments only) */
  --gold:      #c9a227;
  --gold-2:    #e0b83a;

  /* foreground (chalk on void) */
  --chalk:     #e8e4dc;
  --fg-1:      rgba(232,228,220,1.00);
  --fg-2:      rgba(232,228,220,0.70);
  --fg-3:      rgba(232,228,220,0.45);

  /* rules (border opacities) */
  --rule:      rgba(232,228,220,0.08);
  --rule-2:    rgba(232,228,220,0.14);
  --rule-gold: rgba(201,162,39,0.35);

  /* semantic surfaces (default = void) */
  --bg:        var(--void);
  --bg-2:      var(--void-2);
  --bg-3:      var(--void-3);
  --fg:        var(--fg-1);
  --fg-muted:  var(--fg-2);
  --fg-faint:  var(--fg-3);

  /* heritage brand */
  --noon:       #64D8AE;
  --noon-2:     #7FE3BE;
  --noon-deep:  #3FAE87;
  --noon-ink:   #0a3326;
  --iris:       #B08AF9;
  --focus:      #6BA3FF;

  /* type stacks */
  --font-serif: 'Crimson Pro', 'GT Super', Georgia, serif;
  --font-sans:  'Work Sans', 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-mono:  'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  --tracking-caps: 0.14em;

  /* motion */
  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
}

html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  margin: 0;
}

/* ─── PAGE FRAME ─────────────────────────────────────────────────────── */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #06080f;                     /* one shade deeper than --void, for the plate to sit on */
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; overflow:hidden;
  font-family: var(--font-sans);
}

/* ─── STAGE — the atlas plate ───────────────────────────────────────── */
.stage {
  position:relative;
  width:960px; height:540px;
  background: var(--void);
  /* faint cartographic gold grid, major-lines only — the surveyor's paper */
  background-image:
    linear-gradient(to right,  rgba(201,162,39,0.05) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(201,162,39,0.05) 1px, transparent 1px);
  background-size: 64px 64px, 64px 64px;
  border-radius: 4px;                      /* engineered corner, never soft */
  box-shadow: 0 0 0 1px var(--rule-2), 0 40px 80px -30px rgba(0,0,0,0.85);
  overflow:hidden;
  opacity:0; animation: stageFadeIn 600ms var(--ease) forwards;
  color: var(--chalk);
}
@keyframes stageFadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* faint dashed atlas frame inside the stage */
.stage::before {
  content:""; position:absolute; inset:14px;
  border:1px dashed var(--rule-2);
  pointer-events:none;
}

/* ─── TOPOGRAPHIC CONTOUR LANDSCAPE ──────────────────────────────────
   Stroke-only contour lines forming an abstract dune topography
   behind the cluster. Five rings around A (innermost gold = summit
   highlight), three each around B/C, single low horizon sweep.
   No fills, no blur, no glow — pure cartographic line work. */
.topo-layer {
  position:absolute; inset:0;
  width:100%; height:100%;
  pointer-events:none;
  opacity:0;
  animation: topoFadeIn 1800ms 200ms ease forwards;
}
@keyframes topoFadeIn { to { opacity: 1; } }

.topo-layer ellipse,
.topo-layer path {
  fill: none;
  stroke-width: 1;
  vector-effect: non-scaling-stroke;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Terrain bands — dense topographic contours sharing one 3-peak
   dune profile. Gap spacing follows the design system pattern:
   denser at elevation transitions, sparser on flats. Per-band
   opacity baked into the stroke alpha (computed from gap-to-next).   */
.topo-band {
  fill: none;
  stroke-width: 0.8;
  vector-effect: non-scaling-stroke;
  stroke-linecap: round;
  opacity: 0;
  animation: terrainFadeIn 1400ms 400ms ease forwards;
}
@keyframes terrainFadeIn { to { opacity: 1; } }

/* Waypoint route — gold dashed meander connecting the 3 ranks */
.waypoint-route {
  fill: none;
  stroke: var(--gold-2);
  stroke-width: 1;
  stroke-dasharray: 4 3;
  vector-effect: non-scaling-stroke;
  stroke-linecap: round;
  opacity: 0;
  animation: routeFadeIn 1200ms 1800ms ease forwards;
}
@keyframes routeFadeIn { to { opacity: 0.42; } }

/* Waypoint markers — diamond shapes at each rank position.
   B/C are 'passed' (filled gold + small inner dot); A is 'current'
   (filled gold + 4 surrounding crosshair tick marks). Each pops in
   200ms before its avatar drops.                                   */
.waypoint-marker {
  opacity: 0;
  transform-box: fill-box;
  transform-origin: center;
  transform: scale(0);
}
.waypoint-marker-a { animation: markerPop 420ms 2000ms cubic-bezier(0.34, 1.6, 0.64, 1) forwards; }
.waypoint-marker-b { animation: markerPop 420ms 2220ms cubic-bezier(0.34, 1.6, 0.64, 1) forwards; }
.waypoint-marker-c { animation: markerPop 420ms 2440ms cubic-bezier(0.34, 1.6, 0.64, 1) forwards; }
@keyframes markerPop {
  0%   { opacity: 0; transform: scale(0); }
  60%  { opacity: 1; transform: scale(1.18); }
  100% { opacity: 1; transform: scale(1); }
}

/* ─── PARTICLES CANVAS (replaces confetti) ──────────────────────────── */
#particleCanvas { position:absolute; inset:0; pointer-events:none; z-index:60; }

/* ─── MAST: PLATE TITLE + SKIP ──────────────────────────────────────── */
.mast {
  position:absolute; top:24px; left:32px; right:32px;
  display:flex; align-items:center; justify-content:space-between;
  z-index:80;
}
.mast-id {
  display:inline-flex; align-items:center; gap:10px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: var(--tracking-caps);
  text-transform: uppercase;
  color: var(--fg-3);
}
.mast-id .dot { width:4px; height:4px; background: var(--gold-2); transform: rotate(45deg); }
.mast-id b   { color: var(--fg-2); font-weight:500; }

/* secondary button (matches components-buttons.html .secondary) */
.skip-btn {
  font-family: var(--font-sans); font-size: 12px; font-weight:600;
  letter-spacing: var(--tracking-caps); text-transform: uppercase;
  height: 30px; padding: 0 14px;
  background: transparent;
  color: var(--fg-2);
  box-shadow: inset 0 0 0 1px var(--rule-2);
  border: 0; border-radius: 3px; cursor: pointer;
  display:inline-flex; align-items:center; gap:8px;
  transition: all 160ms var(--ease);
  opacity:0; animation: fadeIn 320ms 200ms var(--ease) forwards;
}
.skip-btn:hover { color: var(--chalk); box-shadow: inset 0 0 0 1px rgba(232,228,220,.5); }
.skip-btn svg { width:10px; height:10px; stroke: currentColor; stroke-width:1.5; fill:none; }

/* ─── MAIN STAT BLOCK ───────────────────────────────────────────────── */
.stat-block {
  position:absolute; left:56px; top:96px;
  opacity:0; transform:scale(.85);
  animation: statReveal 520ms 500ms cubic-bezier(0.34,1.45,0.64,1) forwards;
}
@keyframes statReveal {
  0%   { opacity:0; transform:scale(.85); }
  60%  { opacity:1; transform:scale(1.04); }
  100% { opacity:1; transform:scale(1); }
}
.stat-eyebrow {
  font-family: var(--font-sans); font-size: 11px;
  letter-spacing: var(--tracking-caps); text-transform: uppercase;
  font-weight:600; color: var(--gold-2);
  display:inline-flex; align-items:center; gap:10px;
  margin-bottom: 18px;
}
.stat-eyebrow::before { content:""; width:24px; height:1px; background:var(--gold-2); }

.stat-percent {
  font-family: var(--font-serif);
  font-weight:500; font-size: 72px;
  letter-spacing: -0.02em; line-height: .94;
  color: var(--noon);
}
.stat-percent .pct {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 42px;
  color: var(--noon-2);
  letter-spacing:0;
  vertical-align: 16px;
  margin-left: 4px;
}
.stat-subtext {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400; font-size: 16px;
  color: var(--fg-2);
  margin-top: 16px;
  max-width: 18ch;
  opacity:0; animation: fadeIn 400ms 950ms ease forwards;
}

/* ─── TERRAIN COLUMNS (replaces 3D podiums) ─────────────────────────── */
/* Each column is a vertical band of dashed contour lines + a solid
   "elevation" cap at the top where the avatar lands. Heights differ
   so the silhouette still reads as 1-2-3 ranking.                    */
.podium-wrap { position:absolute; inset:0; pointer-events:none; }
.terrain {
  position:absolute;
  display:flex; flex-direction:column; align-items:center;
  opacity:0;
  width: 160px;
}
/* INSIDE-TERRAIN class label — sits between avatar and ground line */
.terrain .class-label {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  margin-bottom: 10px;
  opacity: 0;
}
.terrain .ground {
  width: 160px; height: 1px;
  background: var(--rule-2);
  position:relative;
}
.terrain .ground::before,
.terrain .ground::after {
  content:""; position:absolute; top:-3px; width:1px; height:6px; background: var(--rule-2);
}
.terrain .ground::before { left:0; }
.terrain .ground::after  { right:0; }

.terrain .stripes {
  width: 160px;
  display:flex; flex-direction:column; gap:6px;
  margin-top: 8px;
}
.terrain .stripe {
  height:1px; background: var(--rule);
  transform-origin:center; transform:scaleX(0);
}
.terrain .stripes .stripe:nth-child(1){ width:88%;  align-self:center; }
.terrain .stripes .stripe:nth-child(2){ width:60%;  align-self:center; }
.terrain .stripes .stripe:nth-child(3){ width:32%;  align-self:center; }

/* Coord text overlaps the stripes — like a topographic contour label
   punching through the contour line. The label has a void background
   so it visually "breaks" the stripe behind it. */
.terrain .stripes { position: relative; }
.terrain .coord {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-mono); font-size: 9.5px;
  letter-spacing: .10em; text-transform: uppercase;
  color: var(--fg-3);
  white-space: nowrap;
  background: var(--void);
  padding: 0 6px;
  pointer-events: none;
}
.terrain .coord b { color: var(--fg-2); font-weight:500; }

/* Anchored 14px below each avatar, centered on the avatar.
   Three groups packed close as the central focus of the screen. */
.terrain-1 { left: 400px; top: 276px;
  animation: terrainRise 700ms 1200ms cubic-bezier(0.34,1.2,0.64,1) forwards; }
.terrain-2 { left: 217px; top: 332px;
  animation: terrainRise 700ms 1500ms cubic-bezier(0.34,1.2,0.64,1) forwards; }
.terrain-3 { left: 583px; top: 346px;
  animation: terrainRise 700ms 1750ms cubic-bezier(0.34,1.2,0.64,1) forwards; }

@keyframes terrainRise {
  0%   { opacity:0; transform: translateY(20px); }
  60%  { opacity:1; }
  100% { opacity:1; transform: translateY(0); }
}
/* ── Medal palette: gold / silver / bronze ──
   Gold is a brand signal token. Silver + bronze are tuned to sit
   alongside it — cool muted for silver, warm earthy for bronze. */
:root {
  --silver:      #c5cad6;
  --silver-2:    #8e96a8;
  --silver-deep: #5e6678;
  --bronze:      #c98a4a;
  --bronze-2:    #a86c30;
  --bronze-deep: #6d4318;
}

.terrain-1 .ground { height:1.5px; background: var(--gold); box-shadow: 0 0 12px rgba(224,184,58,0.35); }
.terrain-1 .stripe { background: rgba(201,162,39,.22); }
.terrain-2 .ground { height:1.5px; background: var(--silver-2); box-shadow: 0 0 8px rgba(142,150,168,0.24); }
.terrain-2 .stripe { background: rgba(142,150,168,.22); }
.terrain-3 .ground { height:1.5px; background: var(--bronze-2); box-shadow: 0 0 8px rgba(168,108,48,0.24); }
.terrain-3 .stripe { background: rgba(168,108,48,.22); }

/* dashed gold "you are here" indicator on the gold ground line */
.you-are-here {
  position:absolute; top:-9px; left:50%;
  transform: translateX(-50%);
  width: 1px; height: 12px;
  background: var(--gold-2);
}
.you-are-here::after {
  content:""; position:absolute; left:-3px; top:-3px;
  width:7px; height:7px;
  border:1px solid var(--gold-2);
  transform: rotate(45deg);
  background: var(--void);
}

/* stripe reveal animation, staggered per terrain */
.terrain-1 .stripe { animation: stripeIn 320ms cubic-bezier(.22,.61,.36,1) forwards; }
.terrain-2 .stripe { animation: stripeIn 320ms cubic-bezier(.22,.61,.36,1) forwards; }
.terrain-3 .stripe { animation: stripeIn 320ms cubic-bezier(.22,.61,.36,1) forwards; }
.terrain-1 .stripe:nth-child(1){ animation-delay:1300ms; }
.terrain-1 .stripe:nth-child(2){ animation-delay:1380ms; }
.terrain-1 .stripe:nth-child(3){ animation-delay:1460ms; }
.terrain-1 .stripe:nth-child(4){ animation-delay:1540ms; }
.terrain-1 .stripe:nth-child(5){ animation-delay:1620ms; }
.terrain-2 .stripe:nth-child(1){ animation-delay:1600ms; }
.terrain-2 .stripe:nth-child(2){ animation-delay:1680ms; }
.terrain-2 .stripe:nth-child(3){ animation-delay:1760ms; }
.terrain-2 .stripe:nth-child(4){ animation-delay:1840ms; }
.terrain-2 .stripe:nth-child(5){ animation-delay:1920ms; }
.terrain-3 .stripe:nth-child(1){ animation-delay:1850ms; }
.terrain-3 .stripe:nth-child(2){ animation-delay:1930ms; }
.terrain-3 .stripe:nth-child(3){ animation-delay:2010ms; }
.terrain-3 .stripe:nth-child(4){ animation-delay:2090ms; }
.terrain-3 .stripe:nth-child(5){ animation-delay:2170ms; }
@keyframes stripeIn { from{transform:scaleX(0)} to{transform:scaleX(1)} }

/* ─── AVATARS ───────────────────────────────────────────────────────── */
.avatar { position:absolute; opacity:0; transform: translateY(-50px) scale(.85); overflow: visible; }
.avatar-a { animation: avatarDrop 550ms 2200ms cubic-bezier(0.34,1.4,0.64,1) forwards; }
.avatar-b { animation: avatarDrop 550ms 2420ms cubic-bezier(0.34,1.4,0.64,1) forwards; }
.avatar-c { animation: avatarDrop 550ms 2640ms cubic-bezier(0.34,1.4,0.64,1) forwards; }
@keyframes avatarDrop {
  0%   { opacity:0; transform: translateY(-50px) scale(.85); }
  55%  { opacity:1; transform: translateY(6px) scale(1.04); }
  78%  { transform: translateY(-3px) scale(.99); }
  100% { opacity:1; transform: translateY(0) scale(1); }
}
@keyframes avatarBreathe {
  0%,100% { transform: translateY(0) scale(1); }
  45%     { transform: translateY(-3px) scale(1.015); }
}

/* Identity disk — circular paper portrait with a medal-colored
   outer ring. The line-art figure inside is tinted by its medal. */
.identity {
  position:relative; z-index:1;
  display:flex; align-items:center; justify-content:center;
  border-radius: 999px;
  background: #fffcf2;                 /* warm paper, not pure white */
  overflow: hidden;
}
.identity svg.figure { width:100%; height:100%; display:block; }

.identity-1 {
  width:118px; height:118px;
  box-shadow:
    inset 0 0 0 4px var(--gold-2),
    inset 0 0 0 6px rgba(255,240,180,0.7),
    0 18px 36px -18px rgba(201,162,39,0.55);
}
.identity-2 {
  width: 88px; height: 88px;
  box-shadow:
    inset 0 0 0 3.5px var(--silver),
    inset 0 0 0 5px rgba(255,255,255,0.65),
    0 14px 28px -14px rgba(94,102,120,0.45);
}
.identity-3 {
  width: 88px; height: 88px;
  box-shadow:
    inset 0 0 0 3.5px var(--bronze),
    inset 0 0 0 5px rgba(255,224,190,0.6),
    0 14px 28px -14px rgba(168,108,48,0.45);
}

/* Gold rank ring around 01 — dashed, slow rotation, follows the disk shape */
.rank-ring {
  position:absolute; inset:-14px;
  border: 1px dashed var(--gold-2);
  border-radius: 999px;
  opacity:0; pointer-events:none; z-index:0;
  box-shadow: 0 0 36px rgba(224,184,58,0.22), inset 0 0 16px rgba(224,184,58,0.10);
}
.rank-ring.active { animation: ringIn 320ms 3300ms ease forwards, ringSpin 26s 3700ms linear infinite; }
@keyframes ringIn { to { opacity:1 } }
@keyframes ringSpin { to { transform: rotate(360deg); } }

/* ─── RANK PLATES ────────────────────────────────────────────────────
   Replaces the gold/silver/bronze pill badges. Mono numerals "01/02/03"
   set in surveyor caps on a chalk plate — gold for 1st (arrival), chalk
   for the rest.                                                        */
.rank-plate {
  position:absolute; z-index:20;
  font-family: var(--font-mono);
  font-weight: 700;
  letter-spacing: 0.04em;
  display:flex; align-items:center; justify-content:center;
  border-radius: 999px;
  opacity:0; pointer-events:none;
}
.rank-plate-1 {
  width: 36px; height: 36px;
  font-size: 14px;
  color: var(--void);
  background: radial-gradient(circle at 35% 30%, #ffe98a 0%, var(--gold-2) 60%, var(--gold) 100%);
  box-shadow: inset 0 0 0 2px rgba(255,240,180,0.6), 0 4px 10px rgba(201,162,39,0.45);
  right:-10px; top:-6px;
  animation: badgePop 460ms 2300ms cubic-bezier(0.34,1.6,0.64,1) forwards;
}
.rank-plate-2 {
  width: 30px; height: 30px;
  font-size: 12px;
  color: var(--void);
  background: radial-gradient(circle at 35% 30%, #eef0f5 0%, var(--silver) 60%, var(--silver-2) 100%);
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.5), 0 4px 10px rgba(94,102,120,0.40);
  right:-8px; top:-6px;
  animation: badgeFade 380ms 2530ms ease forwards;
}
.rank-plate-3 {
  width: 30px; height: 30px;
  font-size: 12px;
  color: var(--void);
  background: radial-gradient(circle at 35% 30%, #ecbf90 0%, var(--bronze) 60%, var(--bronze-2) 100%);
  box-shadow: inset 0 0 0 2px rgba(255,224,190,0.5), 0 4px 10px rgba(168,108,48,0.40);
  right:-8px; top:-6px;
  animation: badgeFade 380ms 2750ms ease forwards;
}
@keyframes badgePop {
  0%   { opacity:0; transform: scale(.5) translateY(-6px); }
  55%  { opacity:1; transform: scale(1.18) translateY(0); }
  100% { opacity:1; transform: scale(1); }
}
@keyframes badgeFade {
  from { opacity:0; transform: translateY(-6px); }
  to   { opacity:1; transform: translateY(0); }
}

/* ─── CLASS LABELS (now nested inside .terrain) ─────────────────────── */
.class-pct {
  font-family: var(--font-serif);
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1;
}
.class-pct sup {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .06em;
  vertical-align: top;
  margin-left: 2px;
}
.class-name {
  font-family: var(--font-sans);
  font-weight: 600;
  letter-spacing: var(--tracking-caps);
  text-transform: uppercase;
  color: var(--fg-2);
  font-size: 11px;
}
/* Bigger pct + medal color, scoped per terrain */
.terrain-1 .class-pct { font-size: 28px; color: var(--gold-2); }
.terrain-2 .class-pct { font-size: 22px; color: var(--silver); }
.terrain-3 .class-pct { font-size: 22px; color: var(--bronze); }

/* Stagger the class-label fade-in slightly after each terrain rises */
.terrain-1 .class-label { animation: fadeIn 400ms 2380ms ease forwards; }
.terrain-2 .class-label { animation: fadeIn 400ms 2580ms ease forwards; }
.terrain-3 .class-label { animation: fadeIn 400ms 2780ms ease forwards; }

/* ─── SURVEYOR FLAGS (replaces pennant emoji flags) ─────────────────── */
.flag { position:absolute; opacity:0; animation: fadeIn 500ms 2500ms ease forwards; }
.flag svg { display:block; stroke: currentColor; stroke-width:1.5; fill:none;
  stroke-linecap: square; stroke-linejoin: miter; }
.flag-a { left:556px; top:128px; color: var(--gold-2); animation-delay:2500ms; }
.flag-c { left:738px; top:230px; color: var(--bronze); animation-delay:2900ms; }
.flag .triangle { transform-origin: 1px 1px; }
.flag-a .triangle { animation: flagWave 3.2s 3600ms ease-in-out infinite; }
.flag-b .triangle { animation: flagWave 3.6s 3800ms ease-in-out infinite; }
.flag-c .triangle { animation: flagWave 4.0s 4000ms ease-in-out infinite; }
@keyframes flagWave {
  0%,100% { transform: rotate(0deg) skewX(0deg); }
  30%     { transform: rotate(6deg) skewX(2deg); }
  70%     { transform: rotate(-3deg) skewX(-1deg); }
}

/* ─── CARTOGRAPHIC TICK MARKS (replaces ✦ sparkles) ─────────────────── */
.tick {
  position:absolute; pointer-events:none; opacity:0;
  width:10px; height:10px;
  animation: tickPulse var(--sp-dur) var(--sp-delay) ease-in-out infinite;
}
.tick svg { display:block; width:100%; height:100%;
  stroke: currentColor; stroke-width:1.5; fill:none;
  stroke-linecap: square; stroke-linejoin: miter; }
@keyframes tickPulse {
  0%,100% { opacity:0; transform: scale(.6); }
  20%,80% { opacity:.85; transform: scale(1); }
  50%     { opacity:.55; transform: scale(1.25); }
}

/* ─── BOTTOM CLASSROOM CARDS ───────────────────────────────────────── */
.cards-row {
  position:absolute; left:50%; bottom:22px;
  transform: translateX(-50%) translateY(20px);
  display:flex; gap: 14px; align-items:center;
  opacity:0; animation: cardsUp 500ms 3100ms var(--ease) forwards;
}
@keyframes cardsUp {
  from { opacity:0; transform: translateX(-50%) translateY(20px); }
  to   { opacity:1; transform: translateX(-50%) translateY(0); }
}
.card {
  display:flex; align-items:center; gap:10px;
  padding: 5px 14px 5px 5px;
  background: var(--bg-3);
  box-shadow: inset 0 0 0 1px var(--rule-2);
  border-radius: 999px;
  min-width: 140px;
}
.card .ident {
  width: 28px; height: 28px;
  border-radius: 50%;
  display:flex; align-items:center; justify-content:center;
  font-family: var(--font-serif); font-size: 14px; font-weight: 500;
  color: var(--void);
  background: var(--chalk);
  box-shadow: inset 0 0 0 1px rgba(232,228,220,0.4);
  flex-shrink: 0;
}
/* assorted brand-tinted card avatars so they don't all feel identical */
.card:nth-child(1) .ident { background: radial-gradient(circle at 30% 30%, #c1efdc, var(--noon)); }
.card:nth-child(2) .ident { background: radial-gradient(circle at 30% 30%, #d6c5fb, var(--iris)); }
.card:nth-child(3) .ident { background: radial-gradient(circle at 30% 30%, #f5d670, var(--gold-2)); color: var(--void); }
.card:nth-child(4) .ident { background: radial-gradient(circle at 30% 30%, #b0d8ff, var(--focus)); }
.card:nth-child(5) .ident { background: radial-gradient(circle at 30% 30%, #ecbf90, var(--bronze)); }
.card-info { display:flex; flex-direction:column; gap: 3px; }
.card-name {
  font-family: var(--font-sans);
  font-size: 11px; font-weight: 600;
  letter-spacing: var(--tracking-caps);
  text-transform: uppercase;
  color: var(--fg-2);
  line-height: 1;
}
.card-score {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--noon-2);
  letter-spacing: .04em;
  line-height: 1;
}

/* ─── COORDINATES STRIP (atlas footer) ──────────────────────────────── */
.coords-strip {
  position:absolute; bottom:14px; left:32px; right:32px;
  display:flex; justify-content:space-between;
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: var(--tracking-caps); text-transform: uppercase;
  color: var(--fg-3);
  opacity:0; animation: fadeIn 500ms 3300ms ease forwards;
  pointer-events:none;
}

/* ─── UTILITY ────────────────────────────────────────────────────────── */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>

<script>
/* =========================================================================
   PARTICLE FIELD
   Replaces the rainbow confetti with a subdued surveyor's-page particle:
   chalk dots, faint gold dots, occasional cross-marks. Brand-only colors.
   ========================================================================= */
const canvas = document.getElementById('particleCanvas');
const ctx    = canvas.getContext('2d');
/* Brand-palette confetti: noon green + gold + silver + bronze + iris +
   focus blue + chalk. Dense enough to read as celebration; shapes vary
   between rectangles, circles, and surveyor cross-marks. */
const COLORS = [
  '#64D8AE',  '#7FE3BE',     /* noon green / hover  */
  '#c9a227',  '#e0b83a',     /* gold / gold-2       */
  '#c5cad6',  '#8e96a8',     /* silver              */
  '#c98a4a',  '#a86c30',     /* bronze              */
  '#B08AF9',                 /* iris                */
  '#6BA3FF',                 /* focus blue          */
  '#e8e4dc',                 /* chalk               */
];
let particles = [];
let rafId;
const t0 = performance.now();

function mkP(x, intense) {
  const s = intense ? Math.random()*9 + 4 : Math.random()*5 + 3;
  return {
    x: x ?? Math.random()*960,
    y: -12,
    vx: (Math.random()-0.5) * (intense ? 5 : 2.4),
    vy: Math.random() * (intense ? 3.5 : 1.8) + (intense ? 1.4 : 0.6),
    s,
    ar: Math.random()*0.6 + 0.4,           /* aspect ratio for rectangle confetti */
    col: COLORS[Math.random()*COLORS.length|0],
    shape: Math.random(),                  /* <0.55 rect, <0.85 circle, else cross */
    rot: Math.random()*Math.PI*2,
    rv: (Math.random()-0.5)*0.18,
    life: 1,
    decay: Math.random()*0.005 + (intense ? 0.004 : 0.0022)
  };
}

let lastSpawn = 0;
function tick(now) {
  const e = now - t0;
  ctx.clearRect(0,0,960,540);

  /* OPENING SHOWER — visible right when the stat lands */
  if (e>200 && e<700  && now-lastSpawn>90)  { for(let i=0;i<5;i++) particles.push(mkP(null,false)); lastSpawn=now; }
  /* ARRIVAL BURST — big shower around the 01 podium reveal */
  if (e>2200 && e<4500 && now-lastSpawn>50) { for(let i=0;i<9;i++) particles.push(mkP(null,true));  lastSpawn=now; }
  /* AMBIENT DRIFT afterwards */
  if (e>4500 && now-lastSpawn>260)           { for(let i=0;i<2;i++) particles.push(mkP(null,false)); lastSpawn=now; }

  particles = particles.filter(p => p.life>0.02 && p.y<560);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.045;                          /* gravity matches original */
    p.rot += p.rv; p.life -= p.decay;
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.strokeStyle = p.col;
    ctx.fillStyle   = p.col;
    if (p.shape < 0.55) {
      /* rectangle confetti — the workhorse */
      ctx.fillRect(-p.s/2, -p.s*p.ar/2, p.s, p.s*p.ar);
    } else if (p.shape < 0.85) {
      /* round confetti */
      ctx.beginPath();
      ctx.arc(0, 0, p.s/2, 0, Math.PI*2);
      ctx.fill();
    } else {
      /* surveyor cross — keeps the cartographic accent */
      const r = p.s * 0.55;
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(-r, 0); ctx.lineTo(r, 0);
      ctx.moveTo(0, -r); ctx.lineTo(0, r);
      ctx.stroke();
    }
    ctx.restore();
  }
  rafId = requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* =========================================================================
   AVATAR BREATHING (after drop completes)
   ========================================================================= */
function breathe(el, dur, delay) {
  setTimeout(() => {
    el.style.animation = `avatarBreathe ${dur}s ease-in-out infinite`;
    el.style.opacity   = '1';
    el.style.transform = 'translateY(0) scale(1)';
  }, delay);
}
breathe(document.getElementById('avatarA'), 3.2, 2200+550);
breathe(document.getElementById('avatarB'), 3.6, 2420+550);
breathe(document.getElementById('avatarC'), 2.9, 2640+550);

/* =========================================================================
   AUDIO — Web Audio API only. Same scheduling shape as the original;
   tones tightened to match the brand's institutional voice.
   ========================================================================= */
let audioCtx = null;
const ANIM_START = performance.now();
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playStatReveal() {
  const ctx = getCtx(); if (!ctx || ctx.state==='closed') return;
  const now = ctx.currentTime;

  /* soft wood-tap pop */
  const pop = ctx.createOscillator(), popG = ctx.createGain();
  pop.type = 'triangle';
  pop.frequency.setValueAtTime(280, now);
  pop.frequency.exponentialRampToValueAtTime(140, now+0.10);
  popG.gain.setValueAtTime(0, now);
  popG.gain.linearRampToValueAtTime(0.34, now+0.008);
  popG.gain.exponentialRampToValueAtTime(0.001, now+0.12);
  pop.connect(popG); popG.connect(ctx.destination);
  pop.start(now); pop.stop(now+0.14);

  /* serene chime — D6, A6 (open fifth, austere) */
  [1175, 1760].forEach((f, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    const t = now + 0.05 + i*0.09;
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.30 - i*0.06, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.95);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t+1.0);
  });
}

function playTerrainRise() {
  const ctx = getCtx(); if (!ctx || ctx.state==='closed') return;
  const now = ctx.currentTime;

  /* low filtered-noise rise — the wind across the plate */
  const len = ctx.sampleRate * 0.50;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<len;i++) d[i] = Math.random()*2-1;
  const src = ctx.createBufferSource(); src.buffer = buf;

  const bp = ctx.createBiquadFilter();
  bp.type='bandpass'; bp.Q.value=1.4;
  bp.frequency.setValueAtTime(110, now);
  bp.frequency.exponentialRampToValueAtTime(520, now+0.40);

  const g = ctx.createGain();
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.22, now+0.06);
  g.gain.setValueAtTime(0.18, now+0.30);
  g.gain.exponentialRampToValueAtTime(0.001, now+0.50);

  src.connect(bp); bp.connect(g); g.connect(ctx.destination);
  src.start(now); src.stop(now+0.55);
}

function playArrival() {
  const ctx = getCtx(); if (!ctx || ctx.state==='closed') return;
  const now = ctx.currentTime;
  /* austere arpeggio: D5 A5 D6 — perfect-fifth open intervals */
  const notes = [587, 880, 1175];
  const vols  = [0.26, 0.24, 0.30];
  notes.forEach((f, i) => {
    const t = now + i*0.10;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vols[i], t+0.018);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.55);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t+0.6);
  });
}

const SOUND_CUES = [
  { at: 500,  fn: playStatReveal,  fired:false },
  { at: 1200, fn: playTerrainRise, fired:false },
  { at: 2300, fn: playArrival,     fired:false },
];
function scheduleCues() {
  const ctx = getCtx();
  const elapsed = performance.now() - ANIM_START;
  if (ctx.state === 'suspended') return;
  SOUND_CUES.forEach(c => {
    if (c.fired) return;
    c.fired = true;
    setTimeout(c.fn, Math.max(0, c.at - elapsed));
  });
}
getCtx().resume().then(scheduleCues).catch(()=>{});
function onFirstGesture(){ getCtx().resume().then(scheduleCues).catch(()=>{}); }
document.addEventListener('pointerdown', onFirstGesture, { once:true });
document.addEventListener('keydown',     onFirstGesture, { once:true });
document.addEventListener('touchstart',  onFirstGesture, { once:true });

/* =========================================================================
   SKIP — fade and remove
   ========================================================================= */
document.getElementById('skipBtn').addEventListener('click', () => {
  const stage = document.getElementById('stage');
  try { window.parent && window.parent.postMessage('cheer-skip', '*'); } catch(e){}
  try { if (audioCtx) audioCtx.close(); } catch(e){}
  if (rafId) cancelAnimationFrame(rafId);
  particles = [];
  stage.style.transition = 'opacity 240ms ease, transform 240ms ease';
  stage.style.opacity = '0';
  stage.style.transform = 'scale(0.99)';
  setTimeout(() => { stage.style.display = 'none'; }, 260);
});
</script>
